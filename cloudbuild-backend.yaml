steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/lease-lens-repo/lease-lens-ai:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/lease-lens-repo/lease-lens-ai:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lease-lens-ai
      - --image
      - asia-south1-docker.pkg.dev/$PROJECT_ID/lease-lens-repo/lease-lens-ai:$COMMIT_SHA
      - --region
      - asia-south1
      - --allow-unauthenticated
      - --set-env-vars
      - GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=asia-south1,GOOGLE_GENAI_USE_VERTEXAI=true

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/lease-lens-repo/lease-lens-ai:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
